name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with dev extras)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Dogfood the recall gate
        # The deterministic core must keep catching every structured identifier in the
        # seed corpus — if a regex regresses, this fails the build.
        run: |
          python corpus/build_seed.py
          redactable eval --corpus corpus/seed.jsonl --policy pii-structured --gate
